      (function () {
        var q = window.location.search;
        if (q && q.indexOf("p=") !== -1) {
          var params = {};
          q.slice(1)
            .split("&")
            .forEach(function (kv) {
              var i = kv.indexOf("=");
              if (i > -1) params[kv.slice(0, i)] = kv.slice(i + 1);
            });
          if (params.p !== undefined) {
            var newUrl =
              window.location.pathname.replace(/\/$/, "") +
              decodeURIComponent(params.p).replace(/~and~/g, "&") +
              (params.q ? "?" + decodeURIComponent(params.q).replace(/~and~/g, "&") : "") +
              window.location.hash;
            window.history.replaceState(null, "", newUrl);
          }
        }
      })();

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MyShop</title>
    <script>
      // GitHub Pages SPA fallback. Rewrites the requested path into a query
      // string the app can read on load, then redirects to the SPA root.
      (function () {
        var segmentCount = 0; // 0 for custom domain; bump if hosted at /repo/
        var l = window.location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname
              .split("/")
              .slice(0, 1 + segmentCount)
              .join("/") +
            "/?p=/" +
            l.pathname.slice(1).split("/").slice(segmentCount).join("/").replace(/&/g, "~and~") +
            (l.search ? "&q=" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
